<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Signup | Smart Planner</title>
  <link rel="stylesheet" href="login.css" />
</head>

<body>
  <div class="login-container">
    <div class="login-card">

      <h2 class="fade-item">Create Account</h2>
      <p class="subtitle fade-item">Start planning smart</p>

      <input class="fade-item" type="email" id="email" placeholder="Email address" />
      <input class="fade-item" type="password" id="password" placeholder="Password" />

      <button class="fade-item" onclick="signup()">Signup</button>

      <p class="note fade-item">
        Already have an account?
        <a href="login.html">Login</a>
      </p>

    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
